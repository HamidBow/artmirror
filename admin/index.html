<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Art Mirror — Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d1a; --surface: #161628; --border: rgba(255,255,255,0.1);
      --accent: #4f8ef7; --danger: #e05c5c; --success: #4caf7d;
      --text: #e8e8f0; --muted: #8888aa;
    }
    body { background: var(--bg); color: var(--text); font-family: Arial, sans-serif; min-height: 100vh; }

    /* ── Login ── */
    #login-screen {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; gap: 16px; padding: 20px;
    }
    #login-screen h1 { font-size: 2em; margin-bottom: 8px; }
    #login-screen p { color: var(--muted); max-width: 460px; text-align: center; line-height: 1.5; }
    #login-screen a { color: var(--accent); }
    .token-input {
      width: 100%; max-width: 460px; padding: 12px 16px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 1em;
    }
    .token-input:focus { outline: none; border-color: var(--accent); }

    /* ── Buttons ── */
    .btn {
      padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer;
      font-size: 0.93em; font-weight: 600; transition: opacity 0.15s, transform 0.1s;
      display: inline-flex; align-items: center; gap: 7px;
    }
    .btn:hover { opacity: 0.85; }
    .btn:active { transform: scale(0.97); }
    .btn-primary  { background: var(--accent); color: white; }
    .btn-danger   { background: var(--danger); color: white; }
    .btn-ghost    { background: rgba(255,255,255,0.08); color: var(--text); border: 1px solid var(--border); }
    .btn-success  { background: var(--success); color: white; }

    /* ── App shell ── */
    #app { display: none; }
    .topbar {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 14px 24px; display: flex; align-items: center; justify-content: space-between;
    }
    .topbar h1 { font-size: 1.2em; }
    .topbar-actions { display: flex; gap: 10px; align-items: center; }
    .user-badge {
      font-size: 0.85em; color: var(--muted);
      background: rgba(255,255,255,0.05); border: 1px solid var(--border);
      border-radius: 6px; padding: 5px 10px;
    }

    main { padding: 24px; max-width: 1100px; margin: 0 auto; }

    /* ── Section heading ── */
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .section-header h2 { font-size: 1.1em; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }

    /* ── Collections grid ── */
    .collections-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .collection-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
      overflow: hidden; transition: border-color 0.2s;
    }
    .collection-card:hover { border-color: rgba(255,255,255,0.25); }
    .collection-card-header {
      padding: 14px 16px; display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border); cursor: pointer;
    }
    .collection-card-header h3 { font-size: 1em; }
    .collection-count { font-size: 0.8em; color: var(--muted); }
    .collection-card-body { padding: 14px 16px; display: none; }
    .collection-card-body.open { display: block; }

    /* ── Images grid ── */
    .images-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; margin-bottom: 12px; }
    .image-thumb {
      position: relative; aspect-ratio: 1; border-radius: 6px; overflow: hidden;
      background: rgba(255,255,255,0.04);
    }
    .image-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .image-thumb .delete-btn {
      position: absolute; top: 4px; right: 4px; width: 22px; height: 22px;
      background: rgba(200,50,50,0.85); border: none; border-radius: 50%;
      color: white; font-size: 0.75em; cursor: pointer; display: flex;
      align-items: center; justify-content: center; opacity: 0;
      transition: opacity 0.15s;
    }
    .image-thumb:hover .delete-btn { opacity: 1; }
    .image-name { font-size: 0.65em; color: var(--muted); text-align: center; padding: 3px 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ── Upload zone ── */
    .upload-zone {
      border: 2px dashed var(--border); border-radius: 8px; padding: 20px;
      text-align: center; cursor: pointer; transition: border-color 0.2s, background 0.2s;
      color: var(--muted); font-size: 0.9em;
    }
    .upload-zone:hover, .upload-zone.drag-over { border-color: var(--accent); background: rgba(79,142,247,0.05); }
    .upload-zone input { display: none; }

    /* ── Progress & toast ── */
    .progress-bar { height: 4px; background: var(--border); border-radius: 2px; margin-top: 8px; overflow: hidden; }
    .progress-bar-fill { height: 100%; background: var(--accent); width: 0; transition: width 0.3s; }
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: #1e1e36; border: 1px solid var(--border); border-radius: 8px;
      padding: 12px 20px; color: var(--text); font-size: 0.9em;
      transition: transform 0.3s; z-index: 999; white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
    #toast.success { border-color: var(--success); }
    #toast.error   { border-color: var(--danger); }

    /* ── Regen banner ── */
    .regen-banner {
      background: rgba(79,142,247,0.1); border: 1px solid rgba(79,142,247,0.3);
      border-radius: 8px; padding: 14px 18px; display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 24px; gap: 12px; flex-wrap: wrap;
    }
    .regen-banner p { font-size: 0.9em; color: var(--muted); }

    /* ── New collection form ── */
    .new-col-form { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .new-col-input {
      flex: 1; min-width: 160px; padding: 9px 14px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 0.92em;
    }
    .new-col-input:focus { outline: none; border-color: var(--accent); }

    /* Spinner */
    .spin { display: inline-block; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- ── Login ── -->
<div id="login-screen">
  <h1>🎨 Art Mirror Admin</h1>
  <p>Entrez un <a href="https://github.com/settings/tokens/new?scopes=repo&description=ArtMirror+Admin" target="_blank">Personal Access Token GitHub</a> avec la permission <code>repo</code>.</p>
  <input type="password" id="token-input" class="token-input" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" autocomplete="off">
  <button class="btn btn-primary" onclick="login()">Connexion</button>
  <p id="login-error" style="color:var(--danger);display:none;"></p>
</div>

<!-- ── App ── -->
<div id="app">
  <div class="topbar">
    <h1>🎨 Art Mirror Admin</h1>
    <div class="topbar-actions">
      <span class="user-badge" id="user-badge">…</span>
      <button class="btn btn-ghost" onclick="logout()">Déconnexion</button>
    </div>
  </div>

  <main>
    <!-- Regen banner -->
    <div class="regen-banner">
      <div>
        <strong>Régénérer le site</strong>
        <p>Après avoir ajouté ou supprimé des images, lancez la régénération pour mettre à jour le site en production.</p>
      </div>
      <button class="btn btn-success" onclick="triggerRegen(this)">⚡ Régénérer le site</button>
    </div>

    <!-- New collection -->
    <div class="section-header">
      <h2>Collections</h2>
    </div>
    <div class="new-col-form" style="margin-bottom:20px;">
      <input type="text" id="new-col-name" class="new-col-input" placeholder="Nom de la nouvelle collection (ex: portraits)">
      <button class="btn btn-primary" onclick="createCollection()">+ Nouvelle collection</button>
    </div>

    <!-- Collections -->
    <div id="collections-grid" class="collections-grid">
      <p style="color:var(--muted)">Chargement…</p>
    </div>
  </main>
</div>

<div id="toast"></div>

<script>
const REPO  = 'HamidBow/artmirror';
const API   = 'https://api.github.com';
const BRANCH = 'main';
let TOKEN = '';

// ── Auth ─────────────────────────────────────────────────────────────────────
async function login() {
  TOKEN = document.getElementById('token-input').value.trim();
  if (!TOKEN) return;
  try {
    const res = await gh('GET', '/user');
    localStorage.setItem('am_token', TOKEN);
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('user-badge').textContent = '👤 ' + res.login;
    loadCollections();
  } catch(e) {
    document.getElementById('login-error').textContent = 'Token invalide ou accès refusé.';
    document.getElementById('login-error').style.display = 'block';
  }
}

function logout() {
  localStorage.removeItem('am_token');
  TOKEN = '';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

// Auto-login
window.addEventListener('load', () => {
  const saved = localStorage.getItem('am_token');
  if (saved) {
    document.getElementById('token-input').value = saved;
    TOKEN = saved;
    login();
  }
});

// ── GitHub API helper ─────────────────────────────────────────────────────────
async function gh(method, path, body) {
  const opts = {
    method,
    headers: { Authorization: 'Bearer ' + TOKEN, Accept: 'application/vnd.github+json', 'X-GitHub-Api-Version': '2022-11-28' }
  };
  if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  const res = await fetch(API + path, opts);
  if (!res.ok) throw new Error(await res.text());
  if (res.status === 204) return null;
  return res.json();
}

// ── Collections ───────────────────────────────────────────────────────────────
async function loadCollections() {
  const grid = document.getElementById('collections-grid');
  grid.innerHTML = '<p style="color:var(--muted)"><span class="spin">⏳</span> Chargement…</p>';
  try {
    const items = await gh('GET', `/repos/${REPO}/contents/images?ref=${BRANCH}`);
    const cols = items.filter(i => i.type === 'dir');
    if (cols.length === 0) { grid.innerHTML = '<p style="color:var(--muted)">Aucune collection trouvée dans images/</p>'; return; }
    grid.innerHTML = '';
    for (const col of cols) {
      const card = await buildCollectionCard(col.name);
      grid.appendChild(card);
    }
  } catch(e) {
    grid.innerHTML = `<p style="color:var(--danger)">Erreur : ${e.message}</p>`;
  }
}

async function buildCollectionCard(colName) {
  const images = await gh('GET', `/repos/${REPO}/contents/images/${colName}?ref=${BRANCH}`);
  const imgFiles = images.filter(i => /\.(jpe?g|png|webp)$/i.test(i.name));

  const card = document.createElement('div');
  card.className = 'collection-card';
  card.innerHTML = `
    <div class="collection-card-header" onclick="toggleCard(this)">
      <h3>📁 ${colName}</h3>
      <span class="collection-count">${imgFiles.length} image${imgFiles.length !== 1 ? 's' : ''}</span>
    </div>
    <div class="collection-card-body">
      <div class="images-grid" id="grid-${colName}"></div>
      <label class="upload-zone" id="upload-zone-${colName}">
        <input type="file" accept="image/*" multiple onchange="uploadImages('${colName}', this.files)">
        <div>📤 Cliquez ou glissez des images ici</div>
        <div class="progress-bar"><div class="progress-bar-fill" id="prog-${colName}"></div></div>
      </label>
      <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn btn-danger" style="font-size:0.8em;" onclick="deleteCollection('${colName}')">🗑 Supprimer la collection</button>
      </div>
    </div>`;

  const grid = card.querySelector(`#grid-${colName}`);
  for (const img of imgFiles) {
    const thumb = document.createElement('div');
    thumb.className = 'image-thumb';
    thumb.innerHTML = `
      <img src="https://raw.githubusercontent.com/${REPO}/${BRANCH}/images/${colName}/${img.name}" loading="lazy">
      <button class="delete-btn" title="Supprimer" onclick="deleteImage('${colName}', '${img.name}', '${img.sha}', this)">✕</button>
      <div class="image-name">${img.name}</div>`;
    grid.appendChild(thumb);
  }

  // Drag & drop
  const zone = card.querySelector(`#upload-zone-${colName}`);
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('drag-over'); uploadImages(colName, e.dataTransfer.files); });

  return card;
}

function toggleCard(header) {
  const body = header.nextElementSibling;
  body.classList.toggle('open');
}

// ── Upload ────────────────────────────────────────────────────────────────────
async function uploadImages(colName, files) {
  const prog = document.getElementById(`prog-${colName}`);
  let done = 0;
  for (const file of files) {
    const base64 = await toBase64(file);
    const path = `images/${colName}/${file.name}`;
    try {
      // Check if file exists (to get SHA for update)
      let sha = undefined;
      try { const existing = await gh('GET', `/repos/${REPO}/contents/${path}?ref=${BRANCH}`); sha = existing.sha; } catch(e) {}
      const body = { message: `Admin: ajout de ${file.name} dans ${colName}`, content: base64, branch: BRANCH };
      if (sha) body.sha = sha;
      await gh('PUT', `/repos/${REPO}/contents/${path}`, body);
      done++;
      prog.style.width = (done / files.length * 100) + '%';
      toast(`✅ ${file.name} uploadée`, 'success');
    } catch(e) {
      toast(`❌ Erreur pour ${file.name} : ${e.message}`, 'error');
    }
  }
  setTimeout(() => { prog.style.width = '0'; loadCollections(); }, 1200);
}

function toBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ── Delete image ──────────────────────────────────────────────────────────────
async function deleteImage(colName, fileName, sha, btn) {
  if (!confirm(`Supprimer "${fileName}" de la collection "${colName}" ?`)) return;
  btn.textContent = '…';
  try {
    await gh('DELETE', `/repos/${REPO}/contents/images/${colName}/${fileName}`, {
      message: `Admin: suppression de ${fileName} de ${colName}`, sha, branch: BRANCH
    });
    btn.closest('.image-thumb').remove();
    toast(`🗑 ${fileName} supprimée`, 'success');
  } catch(e) {
    toast(`❌ ${e.message}`, 'error');
    btn.textContent = '✕';
  }
}

// ── Create collection ─────────────────────────────────────────────────────────
async function createCollection() {
  const input = document.getElementById('new-col-name');
  const name  = input.value.trim().toLowerCase().replace(/\s+/g, '_').replace(/[^a-z0-9_-]/g, '');
  if (!name) { toast('Nom de collection invalide', 'error'); return; }
  try {
    // GitHub API needs at least one file to create a folder
    await gh('PUT', `/repos/${REPO}/contents/images/${name}/.gitkeep`, {
      message: `Admin: nouvelle collection "${name}"`,
      content: btoa(''),
      branch: BRANCH
    });
    input.value = '';
    toast(`📁 Collection "${name}" créée`, 'success');
    loadCollections();
  } catch(e) {
    toast(`❌ ${e.message}`, 'error');
  }
}

// ── Delete collection ─────────────────────────────────────────────────────────
async function deleteCollection(colName) {
  if (!confirm(`Supprimer toute la collection "${colName}" et ses images ? Cette action est irréversible.`)) return;
  try {
    const images = await gh('GET', `/repos/${REPO}/contents/images/${colName}?ref=${BRANCH}`);
    for (const img of images) {
      await gh('DELETE', `/repos/${REPO}/contents/images/${colName}/${img.name}`, {
        message: `Admin: suppression de ${colName}/${img.name}`, sha: img.sha, branch: BRANCH
      });
    }
    toast(`🗑 Collection "${colName}" supprimée`, 'success');
    loadCollections();
  } catch(e) {
    toast(`❌ ${e.message}`, 'error');
  }
}

// ── Regen ─────────────────────────────────────────────────────────────────────
async function triggerRegen(btn) {
  const orig = btn.textContent;
  btn.textContent = '⏳ Envoi…';
  btn.disabled = true;
  try {
    await gh('POST', `/repos/${REPO}/actions/workflows/regenerate.yml/dispatches`, { ref: BRANCH });
    toast('🚀 Régénération lancée ! Le site sera mis à jour dans ~1 minute.', 'success');
  } catch(e) {
    toast(`❌ ${e.message}`, 'error');
  }
  btn.textContent = orig;
  btn.disabled = false;
}

// ── Toast ─────────────────────────────────────────────────────────────────────
let toastTimer;
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 3500);
}
</script>
</body>
</html>

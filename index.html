<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Redirection…</title>
    <script>
        var lang = (navigator.language || navigator.userLanguage).split('-')[0];
        var supported = ['en', 'de', 'es', 'it', 'ja'];
        window.location.replace(supported.includes(lang) ? lang + '/' : 'fr/');
    </script>
</head>
<body></body>
</html>

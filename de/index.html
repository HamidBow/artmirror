<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art Mirror</title>
    <style>
        body {
            margin: 0; padding: 20px; box-sizing: border-box;
            font-family: Arial, sans-serif;
            background-color: #000028;
            color: white;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }
        .header { text-align: center; margin-bottom: 20px; margin-top: 60px; }
        .header h1 { font-size: 4em; margin-bottom: 5px; text-transform: uppercase; }
        .header p { font-size: 1.5em; margin: 0; max-width: 800px; line-height: 1.5; }
        .collections {
            display: flex; flex-wrap: wrap;
            justify-content: center; gap: 20px; margin-top: 20px; flex-grow: 1;
        }
        .collection-item {
            text-align: center; text-decoration: none; color: white;
        }
        .collection-item img {
            max-width: 300px; height: auto; object-fit: contain;
            border-radius: 5px; box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
        }
        .collection-item:hover img { transform: scale(1.05); }
        .collection-item h3 { margin-top: 10px; font-size: 1.2em; }
        /* ── Language dropdown ── */
        .lang-dropdown {
            position: fixed; top: 16px; right: 16px; z-index: 300;
            font-family: Arial, sans-serif;
        }
        .lang-dropdown-btn {
            padding: 8px 14px;
            background: rgba(255,255,255,0.12); color: white;
            border: 1px solid rgba(255,255,255,0.28); border-radius: 8px;
            font-weight: 600; font-size: 0.92em; cursor: pointer;
            display: flex; align-items: center; gap: 7px;
            backdrop-filter: blur(6px); transition: background 0.2s; white-space: nowrap;
        }
        .lang-dropdown-btn:hover { background: rgba(255,255,255,0.22); }
        .lang-dropdown-menu {
            display: none; position: absolute; right: 0;
            top: 100%; padding-top: 6px;
            background: rgba(0,0,40,0.97);
            border: 1px solid rgba(255,255,255,0.18); border-radius: 10px;
            overflow: hidden; min-width: 168px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.55);
        }
        .lang-dropdown:hover .lang-dropdown-menu,
        .lang-dropdown.open .lang-dropdown-menu { display: block; }
        .lang-dropdown-menu a {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 16px; color: white; text-decoration: none;
            font-size: 0.93em; transition: background 0.15s;
        }
        .lang-dropdown-menu a:hover { background: rgba(255,255,255,0.1); }
        .lang-dropdown-menu a.lang-active { background: rgba(255,255,255,0.14); font-weight: 700; }
        .footer {
            margin-top: 40px; text-align: center; width: 100%; padding: 10px 0;
            display: flex; flex-direction: column; align-items: center;
        }
        .contact-link, .portfolio-link {
            margin: 5px 0; color: white; text-decoration: underline; font-size: 1.1em;
        }
        .copyright { margin-top: 10px; font-size: 0.9em; color: #ccc; }
    </style>
</head>
<body>

    <div class="lang-dropdown">
        <button class="lang-dropdown-btn">🇩🇪&nbsp;Deutsch ▾</button>
        <div class="lang-dropdown-menu">
            
            <a href="../fr/">🇫🇷&nbsp;Français</a>
            
            <a href="../en/">🇬🇧&nbsp;English</a>
            
            <a href="../de/" class="lang-active">🇩🇪&nbsp;Deutsch</a>
            
            <a href="../es/">🇪🇸&nbsp;Español</a>
            
            <a href="../it/">🇮🇹&nbsp;Italiano</a>
            
            <a href="../ja/">🇯🇵&nbsp;日本語</a>
            
        </div>
    </div>

    <div class="header">
        <h1>Art Mirror</h1>
        <p>Kreation als Spiegel: Kunst, die die Seele widerspiegelt</p>
    </div>

    <div class="collections">
        
        <a href="bleu/index.html" class="collection-item">
            
            <img src="../images/bleu/cover_bleu.jpg" alt="Blau">
            
            <h3>Blau</h3>
        </a>
        
        <a href="chevaux/index.html" class="collection-item">
            
            <img src="../images/chevaux/cover_chevaux.jpg" alt="Pferde">
            
            <h3>Pferde</h3>
        </a>
        
        <a href="marron/index.html" class="collection-item">
            
            <img src="../images/marron/cover_marron.jpg" alt="Marron">
            
            <h3>Marron</h3>
        </a>
        
        <a href="multi/index.html" class="collection-item">
            
            <img src="../images/multi/cover_multi.jpg" alt="Multi">
            
            <h3>Multi</h3>
        </a>
        
        <a href="nouvelle_collection/index.html" class="collection-item">
            
            <img src="../images/nouvelle_collection/cover_nouvelle_collection.png" alt="Nouvelle_collection">
            
            <h3>Nouvelle_collection</h3>
        </a>
        
        <a href="ukraine/index.html" class="collection-item">
            
            <img src="../images/ukraine/cover_ukraine.jpg" alt="Ukraine">
            
            <h3>Ukraine</h3>
        </a>
        
    </div>

    <div class="footer">
        
            <a href="../documents/mon-portfolio.pdf" target="_blank" class="portfolio-link">Portfolio ansehen (PDF)</a>
        
        <a href="contact.html" class="contact-link">Kontakt</a>
        <p class="copyright">© Art Mirror - Hamid B.</p>
    </div>

    <script>
    (function(){
        document.querySelectorAll('.lang-dropdown').forEach(function(dd){
            dd.querySelector('.lang-dropdown-btn').addEventListener('click', function(e){
                e.stopPropagation(); dd.classList.toggle('open');
            });
        });
        document.addEventListener('click', function(){
            document.querySelectorAll('.lang-dropdown.open').forEach(function(dd){ dd.classList.remove('open'); });
        });
    })();
    </script>
</body>
</html>

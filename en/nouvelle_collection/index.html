<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nouvelle_collection - Art Mirror</title>
    <style>
        body {
            margin: 0; padding: 20px; padding-top: 70px;
            font-family: Arial, sans-serif;
            background-color: #000028;
            color: white;
            display: flex; flex-direction: column; align-items: center;
        }
        @media (max-width: 600px) {
            body { padding-top: 90px; }
            .header h1 { font-size: 1.6em; margin-top: 10px; }
        }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { font-size: 2.5em; text-transform: uppercase; }
        .collections-grid {
            display: flex; flex-wrap: wrap;
            justify-content: center; gap: 20px; margin-top: 20px;
        }
        .collection-item {
            text-align: center; text-decoration: none; color: white;
            transition: transform 0.3s ease;
        }
        .collection-item:hover { transform: scale(1.05); }
        .collection-item img {
            width: 300px; height: 300px; object-fit: cover;
            border-radius: 5px; box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }
        .collection-item h3 { margin-top: 10px; font-size: 1.2em; }
        /* ── Back button ── */
        .back-btn {
            position: fixed; top: 16px; left: 16px; z-index: 300;
            display: inline-flex; align-items: center; gap: 7px;
            padding: 8px 16px 8px 12px;
            background: rgba(255,255,255,0.12); color: white;
            text-decoration: none; border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.28);
            font-size: 0.92em; font-weight: 600;
            backdrop-filter: blur(6px);
            transition: background 0.2s, transform 0.15s; white-space: nowrap;
        }
        .back-btn:hover { background: rgba(255,255,255,0.22); transform: translateX(-3px); }
        /* ── Language dropdown ── */
        .lang-dropdown {
            position: fixed; top: 16px; right: 16px; z-index: 300;
            font-family: Arial, sans-serif;
        }
        .lang-dropdown-btn {
            padding: 8px 14px;
            background: rgba(255,255,255,0.12); color: white;
            border: 1px solid rgba(255,255,255,0.28); border-radius: 8px;
            font-weight: 600; font-size: 0.92em; cursor: pointer;
            display: flex; align-items: center; gap: 7px;
            backdrop-filter: blur(6px); transition: background 0.2s; white-space: nowrap;
        }
        .lang-dropdown-btn:hover { background: rgba(255,255,255,0.22); }
        .lang-dropdown-menu {
            display: none; position: absolute; right: 0;
            top: 100%; padding-top: 6px;
            background: rgba(0,0,40,0.97);
            border: 1px solid rgba(255,255,255,0.18); border-radius: 10px;
            overflow: hidden; min-width: 168px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.55);
        }
        .lang-dropdown:hover .lang-dropdown-menu,
        .lang-dropdown.open .lang-dropdown-menu { display: block; }
        .lang-dropdown-menu a {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 16px; color: white; text-decoration: none;
            font-size: 0.93em; transition: background 0.15s;
        }
        .lang-dropdown-menu a:hover { background: rgba(255,255,255,0.1); }
        .lang-dropdown-menu a.lang-active { background: rgba(255,255,255,0.14); font-weight: 700; }
        .footer { margin-top: 40px; text-align: center; padding: 10px 0; width: 100%; }
        .copyright { font-size: 0.9em; color: #ccc; }
    </style>
</head>
<body>

    <a href="../index.html" class="back-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
        Back
    </a>

    <div class="lang-dropdown">
        <button class="lang-dropdown-btn">🇬🇧&nbsp;English ▾</button>
        <div class="lang-dropdown-menu">
            
            <a href="../../fr/nouvelle_collection/">🇫🇷&nbsp;Français</a>
            
            <a href="../../en/nouvelle_collection/" class="lang-active">🇬🇧&nbsp;English</a>
            
            <a href="../../de/nouvelle_collection/">🇩🇪&nbsp;Deutsch</a>
            
            <a href="../../es/nouvelle_collection/">🇪🇸&nbsp;Español</a>
            
            <a href="../../it/nouvelle_collection/">🇮🇹&nbsp;Italiano</a>
            
            <a href="../../ja/nouvelle_collection/">🇯🇵&nbsp;日本語</a>
            
        </div>
    </div>

    <div class="header">
        <h1>Nouvelle_collection</h1>
    </div>

    <div class="collections-grid">
        
        <a href="cover_nouvelle_collection.html" class="collection-item">
            <img src="../../images/nouvelle_collection/cover_nouvelle_collection.png" alt="Nouvelle_collection - cover_nouvelle_collection.png">
        </a>
        
        <a href="Capture d’écran 2026-05-27 à 00.15.41.html" class="collection-item">
            <img src="../../images/nouvelle_collection/Capture d’écran 2026-05-27 à 00.15.41.png" alt="Nouvelle_collection - Capture d’écran 2026-05-27 à 00.15.41.png">
        </a>
        
        <a href="Capture d’écran 2026-05-27 à 00.15.52.html" class="collection-item">
            <img src="../../images/nouvelle_collection/Capture d’écran 2026-05-27 à 00.15.52.png" alt="Nouvelle_collection - Capture d’écran 2026-05-27 à 00.15.52.png">
        </a>
        
    </div>

    <div class="footer">
        <p class="copyright">© Art Mirror - Hamid B.</p>
    </div>

    <script>
    (function(){
        document.querySelectorAll('.lang-dropdown').forEach(function(dd){
            dd.querySelector('.lang-dropdown-btn').addEventListener('click', function(e){
                e.stopPropagation(); dd.classList.toggle('open');
            });
        });
        document.addEventListener('click', function(){
            document.querySelectorAll('.lang-dropdown.open').forEach(function(dd){ dd.classList.remove('open'); });
        });
    })();
    </script>
</body>
</html>

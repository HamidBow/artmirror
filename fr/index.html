<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art Mirror</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #000028;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            min-height: 100vh;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 4em;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        .header p {
            font-size: 1.5em;
            margin: 0;
            max-width: 800px;
            line-height: 1.5;
        }
        .collections {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            flex-grow: 1;
        }
        .collection-item {
            text-align: center;
            text-decoration: none;
            color: white;
        }
        .collection-item img {
            max-width: 300px;
            height: auto;
            object-fit: contain;
            border-radius: 5px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
        }
        .collection-item:hover img {
            transform: scale(1.05);
        }
        .collection-item h3 {
            margin-top: 10px;
            font-size: 1.2em;
        }
        .lang-container {
            position: absolute;
            top: 20px;
            right: 20px;
        }
        .lang-button {
            padding: 10px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            margin-left: 5px;
        }
        .footer {
            margin-top: 40px;
            text-align: center;
            width: 100%;
            padding: 10px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .contact-link, .portfolio-link {
            margin: 5px 0;
            color: white;
            text-decoration: underline;
            font-size: 1.1em;
        }
        .copyright {
            margin-top: 10px;
            font-size: 0.9em;
            color: #ccc;
        }
    </style>
</head>
<body>
    <div class="lang-container">
        
            <a href="../fr/" class="lang-button">Français</a>
        
            <a href="../en/" class="lang-button">English</a>
        
            <a href="../de/" class="lang-button">Deutsch</a>
        
            <a href="../es/" class="lang-button">Español</a>
        
            <a href="../it/" class="lang-button">Italiano</a>
        
            <a href="../ja/" class="lang-button">日本語</a>
        
    </div>
    <div class="header">
        <h1>Art Mirror</h1>
        <p>Création comme un miroir : l’art qui reflète l’âme</p>
    </div>
    <div class="collections">
        
        <a href="bleu/index.html" class="collection-item">
            <img src="./bleu/cover_bleu.jpg" alt="Bleu">
            <h3>Bleu</h3>
        </a>
        
        <a href="chevaux/index.html" class="collection-item">
            <img src="./chevaux/cover_chevaux.jpg" alt="Chevaux">
            <h3>Chevaux</h3>
        </a>
        
        <a href="marron/index.html" class="collection-item">
            <img src="./marron/cover_marron.jpg" alt="Marron">
            <h3>Marron</h3>
        </a>
        
        <a href="multi/index.html" class="collection-item">
            <img src="./multi/cover_multi.jpg" alt="Multi">
            <h3>Multi</h3>
        </a>
        
        <a href="ukraine/index.html" class="collection-item">
            <img src="./ukraine/cover_ukraine.jpg" alt="Ukraine">
            <h3>Ukraine</h3>
        </a>
        
    </div>
    <div class="footer">
        
            <a href="../documents/mon-portfolio.pdf" target="_blank" class="portfolio-link">Voir le portfolio (PDF)</a>
        
        <a href="contact.html" class="contact-link">Contact</a>
        <p class="copyright">© Art Mirror - Hamid B.</p>
    </div>
</body>
</html>

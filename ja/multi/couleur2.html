<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi - アートミラー</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #000028;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
        }
        .full-image-container {
            max-width: 90%;
            max-height: 90vh;
            text-align: center;
            position: relative;
            z-index: 5;
        }
        .full-image-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: block;
        }
        /* ✅ voile par-dessus l'image */
        .anti-copy-veil {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.15); /* ✅ plus visible */
            z-index: 10;
        }
        /* ── Back button ── */
        .back-btn {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 300;
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 8px 16px 8px 12px;
            background: rgba(255,255,255,0.12);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.28);
            font-size: 0.92em;
            font-weight: 600;
            backdrop-filter: blur(6px);
            transition: background 0.2s, transform 0.15s;
            white-space: nowrap;
        }
        .back-btn:hover {
            background: rgba(255,255,255,0.22);
            transform: translateX(-3px);
        }
        .back-btn::before { content: '←'; font-size: 1.05em; }
        /* ── Language dropdown ── */
        .lang-dropdown {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 300;
            font-family: Arial, sans-serif;
        }
        .lang-dropdown-btn {
            padding: 8px 14px;
            background: rgba(255,255,255,0.12);
            color: white;
            border: 1px solid rgba(255,255,255,0.28);
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.92em;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 7px;
            backdrop-filter: blur(6px);
            transition: background 0.2s;
            white-space: nowrap;
        }
        .lang-dropdown-btn:hover {
            background: rgba(255,255,255,0.22);
        }
        .lang-dropdown-menu {
            display: none;
            position: absolute;
            right: 0;
            top: calc(100% + 6px);
            background: rgba(0,0,40,0.97);
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 10px;
            overflow: hidden;
            min-width: 168px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.55);
        }
        .lang-dropdown:hover .lang-dropdown-menu {
            display: block;
        }
        .lang-dropdown-menu a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            color: white;
            text-decoration: none;
            font-size: 0.93em;
            transition: background 0.15s;
        }
        .lang-dropdown-menu a:hover {
            background: rgba(255,255,255,0.1);
        }
        .lang-dropdown-menu a.lang-active {
            background: rgba(255,255,255,0.14);
            font-weight: 700;
        }
        /* ── Carousel navigation ── */
        .carousel-arrow {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            z-index: 300;
        }
        .carousel-arrow.prev { left: 14px; }
        .carousel-arrow.next { right: 14px; }
        .carousel-arrow a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 46px;
            height: 46px;
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.28);
            border-radius: 50%;
            color: white;
            text-decoration: none;
            font-size: 1.3em;
            backdrop-filter: blur(6px);
            transition: background 0.2s, transform 0.15s;
        }
        .carousel-arrow a:hover {
            background: rgba(255,255,255,0.25);
            transform: scale(1.1);
        }
        .carousel-counter {
            position: fixed;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 300;
            background: rgba(0,0,40,0.72);
            color: rgba(255,255,255,0.85);
            padding: 5px 16px;
            border-radius: 20px;
            font-size: 0.82em;
            font-family: Arial, sans-serif;
            border: 1px solid rgba(255,255,255,0.16);
            backdrop-filter: blur(4px);
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body oncontextmenu="return false;">
    <div class="lang-dropdown">
        <button class="lang-dropdown-btn">🇯🇵&nbsp;日本語 ▾</button>
        <div class="lang-dropdown-menu">
            <a href="../../fr/multi/">🇫🇷&nbsp;Français</a>
            <a href="../../en/multi/">🇬🇧&nbsp;English</a>
            <a href="../../de/multi/">🇩🇪&nbsp;Deutsch</a>
            <a href="../../es/multi/">🇪🇸&nbsp;Español</a>
            <a href="../../it/multi/">🇮🇹&nbsp;Italiano</a>
            <a href="../../ja/multi/" class="lang-active">🇯🇵&nbsp;日本語</a>
        </div>
    </div>
    <div class="carousel-arrow prev">
        <a href="couleur12.html" title="Précédent">&#8592;</a>
    </div>
    <div class="carousel-arrow next">
        <a href="couleur3.html" title="Suivant">&#8594;</a>
    </div>
    <div class="carousel-counter">5 / 12</div>
    <a href="index.html" class="back-btn">コレクションに戻る</a>

    <div class="full-image-container">
        <img src="couleur2.jpg" alt="Multi">
    </div>

    <div class="anti-copy-veil"></div> <!-- ✅ voile couvre toute la page -->
</body>
</html>

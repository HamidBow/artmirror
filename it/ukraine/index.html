<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ukraine - Art Mirror</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #000028;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            padding-top: 70px;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 2.5em;
            text-transform: uppercase;
        }
        .collections-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
        .collection-item {
            text-align: center;
            text-decoration: none;
            color: white;
            transition: transform 0.3s ease;
        }
        .collection-item:hover { transform: scale(1.05); }
        .collection-item img {
            width: 300px;
            height: 300px;
            object-fit: cover;
            border-radius: 5px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }
        .collection-item h3 {
            margin-top: 10px;
            font-size: 1.2em;
        }
        /* ── Back button ── */
        .back-btn {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 300;
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 8px 16px 8px 12px;
            background: rgba(255,255,255,0.12);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.28);
            font-size: 0.92em;
            font-weight: 600;
            backdrop-filter: blur(6px);
            transition: background 0.2s, transform 0.15s;
            white-space: nowrap;
        }
        .back-btn:hover {
            background: rgba(255,255,255,0.22);
            transform: translateX(-3px);
        }
        .back-btn::before { content: '←'; font-size: 1.05em; }
        /* ── Language dropdown ── */
        .lang-dropdown {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 300;
        }
        .lang-dropdown-btn {
            padding: 8px 14px;
            background: rgba(255,255,255,0.12);
            color: white;
            border: 1px solid rgba(255,255,255,0.28);
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.92em;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 7px;
            backdrop-filter: blur(6px);
            transition: background 0.2s;
            white-space: nowrap;
        }
        .lang-dropdown-btn:hover { background: rgba(255,255,255,0.22); }
        .lang-dropdown-menu {
            display: none;
            position: absolute;
            right: 0;
            top: calc(100% + 6px);
            background: rgba(0,0,40,0.97);
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 10px;
            overflow: hidden;
            min-width: 168px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.55);
        }
        .lang-dropdown:hover .lang-dropdown-menu { display: block; }
        .lang-dropdown-menu a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            color: white;
            text-decoration: none;
            font-size: 0.93em;
            transition: background 0.15s;
        }
        .lang-dropdown-menu a:hover { background: rgba(255,255,255,0.1); }
        .lang-dropdown-menu a.lang-active {
            background: rgba(255,255,255,0.14);
            font-weight: 700;
        }
        .footer {
            margin-top: 40px;
            text-align: center;
            padding: 10px 0;
            width: 100%;
        }
        .copyright { font-size: 0.9em; color: #ccc; }
        /* ── Language dropdown ── */
